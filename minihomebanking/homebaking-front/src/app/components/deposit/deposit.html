<div class="page-shell narrow-shell">
  <a [routerLink]="accountId ? ['/accounts', accountId] : ['/accounts']" class="back-btn">
    &larr; Back to account
  </a>

  <section class="app-panel">
    <header class="panel-header">
      <div>
        <p class="eyebrow">Account {{ accountId || 'not available' }}</p>
        <h2>Deposit funds</h2>
      </div>
      <span class="status-pill credit">Credit</span>
    </header>

    <form [formGroup]="depositForm" (ngSubmit)="submitDeposit()" class="form-grid" novalidate>
      <div class="field-group">
        <label class="form-label" for="deposit-amount">Amount</label>
        <div class="input-prefix">
          <input
            id="deposit-amount"
            class="form-control"
            [class.is-invalid]="amountInvalid"
            type="number"
            formControlName="amount"
            min="0.01"
            step="0.01"
            inputmode="decimal"
            placeholder="0.00"
            required
          />
        </div>
        <div *ngIf="amountInvalid" class="invalid-feedback d-block">
          Enter an amount greater than zero.
        </div>
      </div>

      <div class="field-group">
        <label class="form-label" for="deposit-description">Description</label>
        <input
          id="deposit-description"
          class="form-control"
          [class.is-invalid]="descriptionInvalid"
          type="text"
          formControlName="description"
          maxlength="120"
          placeholder="Initial deposit, salary, etc."
        />
        <div class="field-meta">{{ depositForm.controls.description.value.length }}/120</div>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success">{{ success }}</div>

      <div class="action-row">
        <a [routerLink]="accountId ? ['/accounts', accountId] : ['/accounts']" class="btn btn-outline-secondary">
          Cancel
        </a>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading || depositForm.invalid || !accountId"
        >
          {{ loading ? 'Processing...' : 'Submit deposit' }}
        </button>
      </div>
    </form>
  </section>
</div>
