<div class="container py-5">
  <div class="mb-4">
    <h2 class="fw-bold">All Accounts</h2>
    <p class="text-muted">Browse users by name, surname and currency.</p>
  </div>

  <div *ngIf="loading()" class="alert alert-info">
    Loading accounts...
  </div>

  <div *ngIf="error()" class="alert alert-danger">
    {{ error() }}
  </div>

  <div *ngIf="!loading() && !error() && accounts().length > 0" class="table-responsive shadow-sm rounded-4 bg-white">
    <table class="table table-striped table-hover mb-0 align-middle">
      <thead class="table-light">
        <tr>
          <th>Name</th>
          <th>Surname</th>
          <th>Currency</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of accounts()" [routerLink]="['/accounts', item.id]" class="table-row">
          <td>{{ item.name }}</td>
          <td>{{ item.surname }}</td>
          <td>{{ item.currency }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading() && !error() && accounts().length === 0" class="alert alert-secondary">
    No accounts found.
  </div>
</div>
