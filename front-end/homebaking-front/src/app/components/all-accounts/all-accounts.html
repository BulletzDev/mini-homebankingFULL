<div class="page-shell">
  <header class="page-header">
    <div>
      <p class="eyebrow">Accounts</p>
      <h1>All accounts</h1>
      <p class="muted-copy">Browse customers, currencies, and account details.</p>
    </div>
    <span class="status-pill">{{ accounts().length }} total</span>
  </header>

  <div *ngIf="loading()" class="alert alert-info">Loading accounts...</div>
  <div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>

  <section *ngIf="!loading() && !error() && accounts().length > 0" class="app-panel p-0">
    <div class="table-responsive">
      <table class="table data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Surname</th>
            <th>Currency</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of accounts()">
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.surname }}</td>
            <td><span class="status-pill">{{ item.currency }}</span></td>
            <td class="text-end">
              <a [routerLink]="['/accounts', item.id]" class="btn btn-sm btn-primary">View</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <div *ngIf="!loading() && !error() && accounts().length === 0" class="empty-state">
    No accounts found.
  </div>
</div>
